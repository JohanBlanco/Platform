name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: GymPlatform

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: GymPlatform/backend/pom.xml

      - name: Run unit and integration tests (H2)
        working-directory: GymPlatform/backend
        run: mvn -B test

  backend-postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: GymPlatform/backend/pom.xml

      - name: Run PostgreSQL integration test (Testcontainers)
        working-directory: GymPlatform/backend
        run: mvn -B -Ppostgres-it test -Dtest=PostgresIntegrationTest
