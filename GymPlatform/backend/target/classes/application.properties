spring.application.name=gym-platform-api
server.port=8080

# Perfiles: dev (H2, default) | dev-postgresql (PG local) | prod (PG remoto)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Demo seeds (desactivado en prod vía application-prod.properties)
app.demo.seed-enabled=true

# JWT
app.jwt.secret=GymPlatformSecretKey2026ChangeThisInProductionMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

# Cifrado de secretos (WhatsApp Cloud API, etc.). Cambiar en producción.
# Si se rota esta clave, hay que volver a guardar los secretos en Configuración → WhatsApp.
app.secrets.encryption-key=GymPlatformSecretsAtRest2026ChangeThisInProductionMustBeLong!!
app.secrets.transit-key-path=./data/whatsapp-transit-rsa.pkcs8

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
app.public-base-url=http://localhost:5173

# Subidas de mercadeo (imágenes de promociones)
app.uploads.dir=./data/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
