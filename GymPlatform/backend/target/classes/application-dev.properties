# Perfil dev (default): H2 en archivo local — persiste entre reinicios
# Seeds: db/demo-seed*.sql
# Activar: (default) o --spring.profiles.active=dev

spring.datasource.url=jdbc:h2:file:./data/gymdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.demo.seed-enabled=true
