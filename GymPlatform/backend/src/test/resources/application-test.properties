# Perfil test: H2 en memoria, aislado por suite de integración
spring.datasource.url=jdbc:h2:mem:gymplatform-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

app.demo.seed-enabled=true
app.uploads.dir=./target/test-uploads
