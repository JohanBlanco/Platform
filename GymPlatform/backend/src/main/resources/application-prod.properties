# Perfil prod: PostgreSQL remoto (Neon, Render, etc.)
# Activar: SPRING_PROFILES_ACTIVE=prod
# Requiere env: DB_URL, DB_USER, DB_PASSWORD (sin defaults de demo)
# ProdDatabaseEnvironmentPostProcessor normaliza DATABASE_URL → spring.datasource.*

# Render inyecta PORT; local default 8080
server.port=${PORT:8080}

# Sin URL válida, Spring Boot crearía H2 embebido (conflicto con driver PostgreSQL)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration$EmbeddedDatabaseConfiguration

spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USER:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.h2.console.enabled=false

app.demo.seed-enabled=false

# Overrides por entorno (Render / local con .env)
app.jwt.secret=${APP_JWT_SECRET:GymPlatformSecretKey2026ChangeThisInProductionMustBeAtLeast256BitsLong!!}
app.secrets.encryption-key=${APP_SECRETS_ENCRYPTION_KEY:GymPlatformSecretsAtRest2026ChangeThisInProductionMustBeLong!!}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:5173}

# Contenedor Render: disco efímero en /tmp
app.uploads.dir=${APP_UPLOADS_DIR:/tmp/gymplatform-uploads}
app.secrets.transit-key-path=${APP_SECRETS_TRANSIT_KEY_PATH:/tmp/gymplatform-data/whatsapp-transit-rsa.pkcs8}
