# DEPRECATED: usar dev-postgresql. Se mantiene por compatibilidad.
# Activar: --spring.profiles.active=postgres  →  equivalente a dev-postgresql

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gymplatform}
spring.datasource.username=${DB_USER:gym}
spring.datasource.password=${DB_PASSWORD:gymsecret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.h2.console.enabled=false

app.demo.seed-enabled=true
