name: Sync Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'web/**'
      - 'docs/**'
      - 'scripts/**'
      - 'e2e/**'
      - '.github/workflows/tests.yml'
      - '.github/workflows/sync-documentation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-docs:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install doc dependencies
        run: npm install

      - name: Export OpenAPI & update docs
        run: npm run docs:sync:full
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

      - name: Commit doc changes back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "No doc changes to commit"
          else
            git commit -m "docs: auto-sync from CI [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
